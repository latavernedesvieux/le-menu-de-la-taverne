<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu de la Taverne — Bibliothèque</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  font-family:"Inter",sans-serif;
  background: url('https://cdna.artstation.com/p/assets/images/images/014/112/166/large/fabrice-levacher-taverne-couleur-ambiance.jpg') center/cover fixed;
  margin:0; padding:0; color:#3b2b1f;
}
body::before {
  content:""; position:fixed; inset:0;
  background:rgba(60,40,20,0.5); z-index:-1;
}
.page { max-width:1200px; margin:2rem auto; background:rgba(245,235,210,0.85); border:6px solid #5b3a1a; border-radius:24px; padding:40px;}
.title { font-family:"MedievalSharp",serif; font-size:3rem; color:#5b3a1a; }
.card { display:flex; gap:1rem; padding:1rem; background:linear-gradient(180deg,#fff5e0,#f2e3c0); border-radius:20px; border:2px solid #5b3a1a; box-shadow:0 10px 25px rgba(0,0,0,.35); cursor:pointer; transition:.3s; }
.card:hover { transform:translateY(-4px) scale(1.02); }
.jaquette { width:200px; height:120px; object-fit:cover; border-radius:12px; border:2px solid #5b3a1a; }
.badge-available {background:#3c7d1f;color:#fff;padding:.3rem .7rem;border-radius:999px;font-weight:600;}
.badge-reserved {background:#d97706;color:#fff;padding:.3rem .7rem;border-radius:999px;font-weight:600;}
</style>
</head>
<body>
<div class="page">
  <h1 class="title mb-6">Le Menu de la Taverne</h1>
  <section id="games-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></section>
</div>

<script>

  {"title":"V Rising","status":"disponible","copies":1,"desc":"Survivez en vampire.","image":"https://sm.ign.com/ign_fr/cover/v/v-rising/v-rising_ra9r.jpg"}
];

const container = document.getElementById("games-container");
games.forEach(g=>{
  const card=document.createElement("article");
  card.className="card";
  const img=document.createElement("img");
  img.className="jaquette";
  img.src=g.image;
  const body=document.createElement("div");
  body.innerHTML=`<h3 class="text-xl font-semibold">${g.title}</h3>
    <span class="${g.status==="Réservé"?"badge-reserved":"badge-available"}">${g.status}</span>
    <p class="text-sm mt-2">${g.desc}</p>
    <p class="italic text-sm mt-1">🎮 Exemplaires : ${g.copies}</p>`;
  card.append(img,body);
  container.appendChild(card);
});
</script>
</body>
</html>
